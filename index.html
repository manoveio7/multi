<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>Square Battle: Multiplataforma</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.55.2/dist/phaser.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>
    <style>
        body { margin: 0; background: #1a1a1a; overflow: hidden; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; }
        #ui { position: fixed; top: 10px; left: 10px; color: white; pointer-events: none; z-index: 10; text-shadow: 1px 1px 2px black; }
    </style>
</head>
<body>
    <div id="ui">
        <div id="score">Puntos: 0</div>
        <div id="status">Buscando comida...</div>
    </div>

<script>
    const myName = prompt("¿Tu nombre?", "Jugador") || "Anónimo";

    const firebaseConfig = {
        apiKey: "AIzaSyBH492P6Zzt sHuMW8USDj-AwXjh2cYzwV4", 
        authDomain: "phasermultiplayer.firebaseapp.com",
        databaseURL: "https://phasermultiplayer-default-rtdb.firebaseio.com",
        projectId: "phasermultiplayer",
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const myId = Math.random().toString(36).substring(7);
    const playerRef = db.ref(`players/${myId}`);
    const foodRef = db.ref('food');

    // --- CONFIGURACIÓN DE ESCALADO ---
    const config = {
        type: Phaser.AUTO,
        scale: {
            mode: Phaser.Scale.FIT, // Ajusta el juego para que quepa en la pantalla
            autoCenter: Phaser.Scale.CENTER_BOTH, // Lo centra siempre
            width: 800,  // Ancho fijo virtual
            height: 600  // Alto fijo virtual
        },
        physics: { default: 'arcade' },
        scene: { create: create, update: update }
    };

    const game = new Phaser.Game(config);
    let container, playerRect, foodGroup;
    let otherPlayers = {};
    let score = 0;
    const myColor = Math.random() * 0xffffff;
    let targetX = 400;
    let targetY = 300;
    const lerpSpeed = 0.001;

    function create() {
        const self = this;
        foodGroup = this.physics.add.group();

        // Jugador local
        playerRect = this.add.rectangle(0, 0, 40, 40, myColor);
        const playerText = this.add.text(0, -35, myName, { fontSize: '16px', fill: '#fff' }).setOrigin(0.5);
        container = this.add.container(400, 300, [playerRect, playerText]);
        container.setSize(40, 40);
        this.physics.add.existing(container);

        playerRef.set({ x: 400, y: 300, id: myId, name: myName, color: myColor, score: 0, size: 40 });
        playerRef.onDisconnect().remove();

        // Lógica de comida mejorada para el área fija (800x600)
        const replenishFood = () => {
            foodRef.once('value', (snapshot) => {
                if (snapshot.numChildren() < 5) { // Subimos a 5 para que no esté vacío
                    foodRef.push({
                        x: Phaser.Math.Between(50, 750),
                        y: Phaser.Math.Between(50, 550)
                    });
                }
            });
        };
        replenishFood();

        foodRef.on('child_added', (snapshot) => {
            const f = snapshot.val();
            const foodItem = self.add.circle(f.x, f.y, 8, 0xffff00);
            foodItem.foodId = snapshot.key;
            foodGroup.add(foodItem);
            this.physics.add.existing(foodItem);
        });

        foodRef.on('child_removed', (snapshot) => {
            foodGroup.getChildren().forEach(child => {
                if (child.foodId === snapshot.key) child.destroy();
            });
            replenishFood();
        });

        this.physics.add.overlap(container, foodGroup, (myPlayer, foodItem) => {
            db.ref(`food/${foodItem.foodId}`).remove();
            score += 10;
            document.getElementById('score').innerText = `Puntos: ${score}`;
            const newSize = 40 + (score / 5);
            playerRect.setDisplaySize(newSize, newSize);
            playerText.y = -(newSize/2 + 15);
            playerRef.update({ score: score, size: newSize });
        });

        // Otros jugadores
        db.ref('players').on('value', (snapshot) => {
            const data = snapshot.val() || {};
            Object.keys(data).forEach(id => {
                if (id === myId) return;
                const p = data[id];
                if (!otherPlayers[id]) {
                    const r = self.add.rectangle(0, 0, p.size, p.size, p.color);
                    const t = self.add.text(0, -(p.size/2 + 15), p.name, { fontSize: '14px', fill: '#fff' }).setOrigin(0.5);
                    otherPlayers[id] = self.add.container(p.x, p.y, [r, t]);
                } else {
                    otherPlayers[id].setPosition(p.x, p.y);
                    otherPlayers[id].list[0].setDisplaySize(p.size, p.size);
                    otherPlayers[id].list[1].y = -(p.size/2 + 15);
                }
            });
            Object.keys(otherPlayers).forEach(id => { if (!data[id]) { otherPlayers[id].destroy(); delete otherPlayers[id]; } });
        });

        // Input adaptado a la cámara (importante para móviles)
        this.input.on('pointermove', (pointer) => {
            if (pointer.isDown) {
                targetX = pointer.worldX;
                targetY = pointer.worldY;
            }
        });
        this.input.on('pointerdown', (pointer) => {
            targetX = pointer.worldX;
            targetY = pointer.worldY;
        });
    }

    function update() {
        if (!container) return;
        container.x = Phaser.Math.Linear(container.x, targetX, lerpSpeed);
        container.y = Phaser.Math.Linear(container.y, targetY, lerpSpeed);
        if (Phaser.Math.Distance.Between(container.x, container.y, targetX, targetY) > 1) {
            playerRef.update({ x: container.x, y: container.y });
        }
    }
</script>
</body>
</html>

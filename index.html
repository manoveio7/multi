<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>Square Battle: Nombres y Duelo</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.55.2/dist/phaser.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>
    <style>
        body { margin: 0; background: #1a1a1a; overflow: hidden; font-family: sans-serif; }
        #ui { position: fixed; top: 10px; left: 10px; color: white; pointer-events: none; z-index: 10; }
    </style>
</head>
<body>
    <div id="ui">
        <div id="score">Puntos: 0</div>
        <div id="status">Buscando comida... (Máx 2)</div>
    </div>

<script>
    // 1. Pedir nombre al iniciar
    const myName = prompt("¿Cuál es tu nombre guerrero?", "Jugador") || "Anónimo";

    const firebaseConfig = {
        apiKey: "AIzaSyBH492P6Zzt sHuMW8USDj-AwXjh2cYzwV4", 
        authDomain: "phasermultiplayer.firebaseapp.com",
        databaseURL: "https://phasermultiplayer-default-rtdb.firebaseio.com",
        projectId: "phasermultiplayer",
        storageBucket: "phasermultiplayer.firebasestorage.app",
        messagingSenderId: "1039473102775",
        appId: "1:1039473102775:web:46391f6a4192f65561a232"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const myId = Math.random().toString(36).substring(7);
    const playerRef = db.ref(`players/${myId}`);
    const foodRef = db.ref('food');

    const config = {
        type: Phaser.AUTO,
        width: window.innerWidth,
        height: window.innerHeight,
        physics: { default: 'arcade' },
        scene: { create: create, update: update }
    };

    const game = new Phaser.Game(config);
    let container; // Ahora el jugador principal es un contenedor
    let playerRect; 
    let otherPlayers = {};
    let foodGroup;
    let score = 0;
    const myColor = Math.random() * 0xffffff;
    
    let targetX = 400;
    let targetY = 300;
    const lerpSpeed = 0.1; // Un poco más rápido para mejorar la respuesta

    function create() {
        const self = this;
        foodGroup = this.physics.add.group();

        // --- CREAR MI JUGADOR (Contenedor) ---
        playerRect = this.add.rectangle(0, 0, 40, 40, myColor);
        const playerText = this.add.text(0, -35, myName, { fontSize: '16px', fill: '#fff' }).setOrigin(0.5);
        
        container = this.add.container(400, 300, [playerRect, playerText]);
        container.setSize(40, 40);
        this.physics.add.existing(container);
        
        targetX = container.x;
        targetY = container.y;

        // Guardar nombre en Firebase
        playerRef.set({ 
            x: container.x, 
            y: container.y, 
            id: myId, 
            name: myName, 
            color: myColor, 
            score: 0, 
            size: 40 
        });
        playerRef.onDisconnect().remove();

        // Lógica de comida (se mantiene igual)
        const replenishFood = () => {
            foodRef.once('value', (snapshot) => {
                if (snapshot.numChildren() < 2) {
                    foodRef.push({
                        x: Math.floor(Math.random() * (window.innerWidth - 50)) + 25,
                        y: Math.floor(Math.random() * (window.innerHeight - 50)) + 25
                    });
                }
            });
        };
        replenishFood();

        foodRef.on('child_added', (snapshot) => {
            const f = snapshot.val();
            const foodItem = self.add.circle(f.x, f.y, 10, 0xffff00);
            foodItem.foodId = snapshot.key;
            foodGroup.add(foodItem);
            this.physics.add.existing(foodItem);
        });

        foodRef.on('child_removed', (snapshot) => {
            foodGroup.getChildren().forEach(child => {
                if (child.foodId === snapshot.key) child.destroy();
            });
            replenishFood();
        });

        // Colisión con comida
        this.physics.add.overlap(container, foodGroup, (myPlayer, foodItem) => {
            db.ref(`food/${foodItem.foodId}`).remove();
            score += 10;
            document.getElementById('score').innerText = `Puntos: ${score}`;
            const newSize = 40 + (score / 5);
            
            // Escalar el cuadrado dentro del contenedor
            playerRect.setDisplaySize(newSize, newSize);
            playerText.y = -(newSize/2 + 15); // Ajustar altura del nombre según tamaño
            
            playerRef.update({ score: score, size: newSize });
        });

        // --- GESTIÓN DE OTROS JUGADORES ---
        db.ref('players').on('value', (snapshot) => {
            const playersData = snapshot.val() || {};
            Object.keys(playersData).forEach(id => {
                if (id === myId) return;

                const p = playersData[id];
                if (!otherPlayers[id]) {
                    // Crear nuevo jugador remoto
                    const rect = self.add.rectangle(0, 0, p.size, p.size, p.color);
                    const txt = self.add.text(0, -(p.size/2 + 15), p.name, { fontSize: '14px', fill: '#fff' }).setOrigin(0.5);
                    otherPlayers[id] = self.add.container(p.x, p.y, [rect, txt]);
                } else {
                    // Actualizar jugador remoto
                    otherPlayers[id].setPosition(p.x, p.y);
                    const rect = otherPlayers[id].list[0];
                    const txt = otherPlayers[id].list[1];
                    rect.setDisplaySize(p.size, p.size);
                    txt.y = -(p.size/2 + 15);
                }
            });

            // Eliminar los que se desconectan
            Object.keys(otherPlayers).forEach(id => {
                if (!playersData[id]) { 
                    otherPlayers[id].destroy(); 
                    delete otherPlayers[id]; 
                }
            });
        });

        this.input.on('pointermove', (pointer) => { if (pointer.isDown) { targetX = pointer.x; targetY = pointer.y; } });
        this.input.on('pointerdown', (pointer) => { targetX = pointer.x; targetY = pointer.y; });
    }

    function update() {
        if (!container) return;

        // Movimiento suave con LERP
        container.x = Phaser.Math.Linear(container.x, targetX, lerpSpeed);
        container.y = Phaser.Math.Linear(container.y, targetY, lerpSpeed);

        // Actualizar Firebase si hubo movimiento
        if (Math.abs(container.x - targetX) > 0.1 || Math.abs(container.y - targetY) > 0.1) {
            playerRef.update({ x: container.x, y: container.y });
        }
    }

    window.addEventListener('resize', () => { game.scale.resize(window.innerWidth, window.innerHeight); });
</script>
</body>
</html>

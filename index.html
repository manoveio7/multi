<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>Square Battle: Duelo por la Comida</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.55.2/dist/phaser.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>
    <style>
        body { margin: 0; background: #1a1a1a; overflow: hidden; font-family: sans-serif; }
        #ui { position: fixed; top: 10px; left: 10px; color: white; pointer-events: none; z-index: 10; }
    </style>
</head>
<body>
    <div id="ui">
        <div id="score">Puntos: 0</div>
        <div id="status">Buscando comida... (Máx 2)</div>
    </div>

<script>
    // --- CONFIGURACIÓN FIREBASE ---
    const firebaseConfig = {
        apiKey: "AIzaSyBH492P6Zzt sHuMW8USDj-AwXjh2cYzwV4", 
        authDomain: "phasermultiplayer.firebaseapp.com",
        databaseURL: "https://phasermultiplayer-default-rtdb.firebaseio.com",
        projectId: "phasermultiplayer",
        storageBucket: "phasermultiplayer.firebasestorage.app",
        messagingSenderId: "1039473102775",
        appId: "1:1039473102775:web:46391f6a4192f65561a232"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const myId = Math.random().toString(36).substring(7);
    const playerRef = db.ref(`players/${myId}`);
    const foodRef = db.ref('food');

    const config = {
        type: Phaser.AUTO,
        width: window.innerWidth,
        height: window.innerHeight,
        physics: { default: 'arcade' },
        scene: { 
            create: create,
            update: update // Añadimos la función update aquí
        }
    };

    const game = new Phaser.Game(config);
    let player;
    let otherPlayers = {};
    let foodGroup;
    let score = 0;
    const myColor = Math.random() * 0xffffff;
    
    // Variables para el movimiento LERP
    let targetX = 400;
    let targetY = 300;
    const lerpSpeed = 0.005; // Ajusta este valor (0.05 lento - 0.5 rápido)

    function create() {
        const self = this;
        foodGroup = this.physics.add.group();

        player = this.add.rectangle(400, 300, 40, 40, myColor);
        this.physics.add.existing(player);
        
        targetX = player.x;
        targetY = player.y;

        playerRef.set({ x: player.x, y: player.y, id: myId, color: myColor, score: 0, size: 40 });
        playerRef.onDisconnect().remove();

        const replenishFood = () => {
            foodRef.once('value', (snapshot) => {
                const currentFoodCount = snapshot.numChildren();
                if (currentFoodCount < 2) {
                    const toAdd = 2 - currentFoodCount;
                    for(let i=0; i<toAdd; i++) {
                        foodRef.push({
                            x: Math.floor(Math.random() * (window.innerWidth - 50)) + 25,
                            y: Math.floor(Math.random() * (window.innerHeight - 50)) + 25
                        });
                    }
                }
            });
        };

        replenishFood();

        foodRef.on('child_added', (snapshot) => {
            const f = snapshot.val();
            const foodItem = self.add.circle(f.x, f.y, 10, 0xffff00);
            foodItem.foodId = snapshot.key;
            foodGroup.add(foodItem);
            this.physics.add.existing(foodItem);
        });

        foodRef.on('child_removed', (snapshot) => {
            foodGroup.getChildren().forEach(child => {
                if (child.foodId === snapshot.key) child.destroy();
            });
            replenishFood();
        });

        this.physics.add.overlap(player, foodGroup, (myPlayer, foodItem) => {
            db.ref(`food/${foodItem.foodId}`).remove();
            score += 10;
            document.getElementById('score').innerText = `Puntos: ${score}`;
            const newSize = 40 + (score / 5);
            player.setDisplaySize(newSize, newSize);
            playerRef.update({ score: score, size: newSize });
        });

        db.ref('players').on('value', (snapshot) => {
            const playersData = snapshot.val() || {};
            Object.keys(playersData).forEach(id => {
                if (id === myId) return;
                if (!otherPlayers[id]) {
                    const p = playersData[id];
                    otherPlayers[id] = self.add.rectangle(p.x, p.y, p.size, p.size, p.color);
                } else {
                    const p = playersData[id];
                    // Para otros jugadores, también podrías aplicar LERP aquí para que no se vean "laggeados"
                    otherPlayers[id].setPosition(p.x, p.y);
                    otherPlayers[id].setDisplaySize(p.size, p.size);
                }
            });
            Object.keys(otherPlayers).forEach(id => {
                if (!playersData[id]) { otherPlayers[id].destroy(); delete otherPlayers[id]; }
            });
        });

        // Solo actualizamos el objetivo del movimiento
        this.input.on('pointermove', (pointer) => {
            if (pointer.isDown) {
                targetX = pointer.x;
                targetY = pointer.y;
            }
        });
        
        this.input.on('pointerdown', (pointer) => {
            targetX = pointer.x;
            targetY = pointer.y;
        });
    }

    function update() {
        if (!player) return;

        // --- LÓGICA LERP DE PHASER 3 ---
        // Interpolamos la posición actual hacia la posición del objetivo
        player.x = Phaser.Math.Linear(player.x, targetX, lerpSpeed);
        player.y = Phaser.Math.Linear(player.y, targetY, lerpSpeed);

        // Enviamos la posición a Firebase (solo si ha cambiado significativamente para ahorrar ancho de banda)
        if (Math.abs(player.x - targetX) > 0.1 || Math.abs(player.y - targetY) > 0.1) {
            playerRef.update({ x: player.x, y: player.y });
        }
    }

    window.addEventListener('resize', () => { game.scale.resize(window.innerWidth, window.innerHeight); });
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>Square Battle: Anti-Lag Fix</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.55.2/dist/phaser.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>
    <style> body { margin: 0; background: #000; overflow: hidden; } </style>
</head>
<body>
<script>
    const myName = prompt("¿Tu nombre?", "Jugador") || "Anónimo";
    const firebaseConfig = {
        apiKey: "AIzaSyBH492P6Zzt sHuMW8USDj-AwXjh2cYzwV4", 
        databaseURL: "https://phasermultiplayer-default-rtdb.firebaseio.com",
        projectId: "phasermultiplayer",
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const myId = Math.random().toString(36).substring(7);
    
    const config = {
        type: Phaser.AUTO,
        scale: { mode: Phaser.Scale.FIT, autoCenter: Phaser.Scale.CENTER_BOTH, width: 450, height: 800 },
        physics: { default: 'arcade' },
        scene: { create: create, update: update }
    };

    const game = new Phaser.Game(config);
    let container, foodGroup, obstaclesGroup;
    let otherPlayers = {}; 
    let targetX = 225, targetY = 400;
    let score = 0;

    function create() {
        const self = this;
        foodGroup = this.physics.add.group();
        obstaclesGroup = this.physics.add.group();
        const uiScore = this.add.text(20, 20, 'Comidas: 0', { fontSize: '18px', fill: '#fff' }).setDepth(100);

        // 1. OBSTÁCULOS FIJOS (EVITA RE-DIBUJAR)
        for(let i = 0; i < 3; i++) {
            let x = [100, 350, 225][i];
            let y = [200, 400, 600][i];
            let obs = self.add.circle(x, y, 25, 0xff0000);
            obstaclesGroup.add(obs);
            self.physics.add.existing(obs);
        }

        // 2. SINCRONIZACIÓN BLINDADA
        db.ref('players').on('value', snap => {
            const data = snap.val() || {};
            // Borrar lo que no existe
            Object.keys(otherPlayers).forEach(id => {
                if (!data[id]) { 
                    if(otherPlayers[id]) otherPlayers[id].destroy(); 
                    delete otherPlayers[id]; 
                }
            });
            // Mover o crear
            Object.keys(data).forEach(id => {
                if (id === myId) return;
                const p = data[id];
                if (!otherPlayers[id]) {
                    const r = self.add.rectangle(0, 0, p.size || 40, p.size || 40, p.color);
                    const t = self.add.text(0, -35, p.name, { fontSize: '12px', fill: '#fff' }).setOrigin(0.5);
                    otherPlayers[id] = self.add.container(p.x, p.y, [r, t]);
                } else if (otherPlayers[id].active) {
                    otherPlayers[id].x = p.x;
                    otherPlayers[id].y = p.y;
                }
            });
        });

        // 3. COMIDAS (CONTROL DE ERRORES)
        db.ref('food').on('value', snap => {
            foodGroup.clear(true, true);
            const data = snap.val() || {};
            Object.keys(data).forEach(key => {
                const f = data[key];
                const dot = self.add.circle(f.x, f.y, 10, 0xffff00);
                dot.foodId = key;
                foodGroup.add(dot);
                self.physics.add.existing(dot);
            });
        });

        const spawnFood = () => {
            db.ref('food').once('value', snap => {
                if (snap.numChildren() < 3) {
                    db.ref('food').push({ x: Phaser.Math.Between(50, 400), y: Phaser.Math.Between(120, 700) });
                }
            });
        };

        // MI JUGADOR
        const myColor = Math.random() * 0xffffff;
        const myRect = this.add.rectangle(0, 0, 40, 40, myColor);
        const myTxt = this.add.text(0, -35, myName, { fontSize: '14px', fill: '#fff' }).setOrigin(0.5);
        container = this.add.container(225, 400, [myRect, myTxt]);
        this.physics.add.existing(container);

        db.ref(`players/${myId}`).set({ x: 225, y: 400, name: myName, color: myColor, score: 0, size: 40 });
        db.ref(`players/${myId}`).onDisconnect().remove();

        // COLISIONES SIMPLES
        this.physics.add.overlap(container, foodGroup, (p, f) => {
            db.ref(`food/${f.foodId}`).remove();
            score++;
            uiScore.setText(`Comidas: ${score}`);
            myRect.setDisplaySize(40 + score, 40 + score);
            db.ref(`players/${myId}`).update({ score: score, size: 40 + score });
            spawnFood();
        });

        this.input.on('pointermove', p => { if(p.isDown) { targetX = p.worldX; targetY = p.worldY; }});
        this.input.on('pointerdown', p => { targetX = p.worldX; targetY = p.worldY; });
        spawnFood();
    }

    function update() {
        if (!container) return;
        // Movimiento suave y constante
        container.x = Phaser.Math.Linear(container.x, targetX, 0.1);
        container.y = Phaser.Math.Linear(container.y, targetY, 0.1);
        
        // Enviar posición solo 30 veces por segundo (evita el cuelgue)
        if (game.loop.frame % 2 === 0) {
            db.ref(`players/${myId}`).update({ x: container.x, y: container.y });
        }
    }
</script>
</body>
</html>

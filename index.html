<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>Square Battle: King of the Hill</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.55.2/dist/phaser.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>
    <style> body { margin: 0; background: #000; overflow: hidden; } </style>
</head>
<body>
<script>
    const myName = prompt("¿Tu nombre?", "Jugador") || "Pro";
    const firebaseConfig = {
        apiKey: "AIzaSyBH492P6Zzt sHuMW8USDj-AwXjh2cYzwV4", 
        databaseURL: "https://phasermultiplayer-default-rtdb.firebaseio.com",
        projectId: "phasermultiplayer",
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const myId = Math.random().toString(36).substring(7);

    const config = {
        type: Phaser.AUTO,
        width: 450, height: 800,
        physics: { default: 'arcade' },
        scene: { create: create, update: update }
    };
    const game = new Phaser.Game(config);

    let player, singleFood, obsGroup, uiLider, uiPuntos;
    let others = {};
    let score = 0, targetX = 225, targetY = 400, isStunned = false;

    function create() {
        const self = this;
        obsGroup = this.physics.add.staticGroup();

        // UI
        uiLider = this.add.text(225, 50, '👑 LIDER: ---', { fontSize: '22px', fill: '#ffcc00', fontStyle: 'bold' }).setOrigin(0.5).setDepth(100);
        uiPuntos = this.add.text(20, 20, 'Puntos: 0', { fontSize: '16px', fill: '#fff' }).setDepth(100);

        // 1. OBSTÁCULOS SÓLIDOS
        [{x:110,y:250}, {x:340,y:450}, {x:225,y:650}].forEach(p => {
            let o = self.add.circle(p.x, p.y, 25, 0xff0000);
            obsGroup.add(o);
            o.body.setCircle(25);
        });

        // 2. MI JUGADOR
        const color = Math.random() * 0xffffff;
        let rect = this.add.rectangle(0, 0, 40, 40, color);
        let txt = this.add.text(0, -35, myName, { fontSize: '14px', fontStyle: 'bold' }).setOrigin(0.5);
        player = this.add.container(225, 400, [rect, txt]);
        this.physics.add.existing(player);
        player.body.setCollideWorldBounds(true);

        // 3. LA ÚNICA COMIDA (Sincronizada)
        singleFood = this.add.circle(0, 0, 12, 0xffff00);
        this.physics.add.existing(singleFood);
        
        // Escuchar posición de la comida única
        db.ref('singleFood').on('value', snap => {
            const pos = snap.val();
            if (pos) {
                singleFood.setPosition(pos.x, pos.y);
                singleFood.setActive(true).setVisible(true);
            }
        });

        // Inicializar comida si no existe en la DB
        db.ref('singleFood').get().then(snap => {
            if (!snap.exists()) db.ref('singleFood').set({ x: 225, y: 200 });
        });

        // 4. RED: JUGADORES Y LÍDER
        db.ref(`players/${myId}`).set({ x: 225, y: 400, name: myName, score: 0, color: color });
        db.ref(`players/${myId}`).onDisconnect().remove();

        db.ref('players').on('value', snap => {
            const data = snap.val() || {};
            let topS = -1, topN = "---";
            
            Object.keys(others).forEach(id => { if (!data[id]) { others[id].destroy(); delete others[id]; } });
            
            Object.keys(data).forEach(id => {
                const d = data[id];
                if (d.score > topS) { topS = d.score; topN = d.name; }
                if (id === myId) return;
                if (!others[id]) {
                    let r = self.add.rectangle(0, 0, 40, 40, d.color);
                    let t = self.add.text(0, -35, d.name, { fontSize: '12px' }).setOrigin(0.5);
                    others[id] = self.add.container(d.x, d.y, [r, t]);
                } else {
                    others[id].setPosition(d.x, d.y);
                    others[id].list[0].setDisplaySize(40 + (d.score || 0), 40 + (d.score || 0));
                }
            });
            uiLider.setText(`👑 LIDER: ${topN} (${topS})`);
        });

        // --- COLISIONES ---
        // Chocar con obstáculos (te frena)
        this.physics.add.collider(player, obsGroup, () => {
            if (!isStunned) {
                isStunned = true;
                player.setAlpha(0.4);
                self.time.delayedCall(800, () => { isStunned = false; player.setAlpha(1); });
            }
        });

        // Pelea por la comida
        this.physics.add.overlap(player, singleFood, () => {
            // Reposicionar comida instantáneamente para todos
            const newX = Phaser.Math.Between(50, 400);
            const newY = Phaser.Math.Between(150, 700);
            db.ref('singleFood').set({ x: newX, y: newY });
            
            // Subir puntos
            score++;
            uiPuntos.setText('Puntos: ' + score);
            player.list[0].setDisplaySize(40 + (score * 2), 40 + (score * 2));
            db.ref(`players/${myId}`).update({ score: score });
        });

        this.input.on('pointermove', p => { targetX = p.worldX; targetY = p.worldY; });
        this.input.on('pointerdown', p => { targetX = p.worldX; targetY = p.worldY; });
    }

    function update() {
        if (!player || isStunned) return;
        player.x = Phaser.Math.Linear(player.x, targetX, 0.15);
        player.y = Phaser.Math.Linear(player.y, targetY, 0.15);

        if (game.loop.frame % 3 === 0) {
            db.ref(`players/${myId}`).update({ x: player.x, y: player.y });
        }
    }
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>Square Battle: Mobile Edition</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.55.2/dist/phaser.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>
    <style>
        body { margin: 0; background: #1a1a1a; overflow: hidden; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; }
        #ui { position: fixed; top: 40px; left: 10px; color: white; pointer-events: none; z-index: 10; }
        #leader { position: fixed; top: 10px; width: 100%; text-align: center; color: #ffcc00; font-weight: bold; font-size: 18px; pointer-events: none; z-index: 10; text-shadow: 2px 2px #000; }
    </style>
</head>
<body>
    <div id="ui"><div id="score">Comidas: 0</div></div>
    <div id="leader">Líder: Esperando...</div>

<script>
    const myName = prompt("¿Tu nombre?", "Jugador") || "Anónimo";

    const firebaseConfig = {
        apiKey: "AIzaSyBH492P6Zzt sHuMW8USDj-AwXjh2cYzwV4", 
        databaseURL: "https://phasermultiplayer-default-rtdb.firebaseio.com",
        projectId: "phasermultiplayer",
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const myId = Math.random().toString(36).substring(7);
    const playerRef = db.ref(`players/${myId}`);
    const foodRef = db.ref('food');

    // --- CONFIGURACIÓN VERTICAL (MOBILE FRIENDLY) ---
    const config = {
        type: Phaser.AUTO,
        scale: { 
            mode: Phaser.Scale.FIT, 
            autoCenter: Phaser.Scale.CENTER_BOTH, 
            width: 450,  // Más angosto
            height: 800  // Más alto
        },
        physics: { default: 'arcade' },
        scene: { create: create, update: update }
    };

    const game = new Phaser.Game(config);
    let container, playerRect, foodGroup, obstaclesGroup, blinkTween;
    let otherPlayers = {};
    let score = 0;
    let isHunter = false;
    let isFrozen = false;
    let hunterTimer = null;
    const myColor = Math.random() * 0xffffff;
    let targetX = 225, targetY = 400;

    const VELOCIDAD_BASE = 0.08;
    const FACTOR_PESO = 0.005;

    function create() {
        const self = this;
        foodGroup = this.physics.add.group();
        obstaclesGroup = this.physics.add.group();

        playerRect = this.add.rectangle(0, 0, 40, 40, myColor);
        const playerText = this.add.text(0, -35, myName, { fontSize: '14px', fill: '#fff' }).setOrigin(0.5);
        container = this.add.container(225, 400, [playerRect, playerText]);
        container.setSize(40, 40);
        this.physics.add.existing(container);

        playerRef.set({ x: 225, y: 400, id: myId, name: myName, color: myColor, score: 0, size: 40, isHunter: false });
        playerRef.onDisconnect().remove();

        // Obstáculos distribuidos verticalmente
        for(let i = 0; i < 7; i++) {
            let x = Phaser.Math.Between(50, 400);
            let y = Phaser.Math.Between(100, 700);
            // Evitar que aparezcan justo en el inicio
            if (Phaser.Math.Distance.Between(x, y, 225, 400) < 100) y += 200;
            
            let obs = this.add.circle(x, y % 750, 20, 0xff0000);
            obstaclesGroup.add(obs);
            this.physics.add.existing(obs);
        }

        // Colisión Comida
        this.physics.add.overlap(container, foodGroup, (myPlayer, foodItem) => {
            db.ref(`food/${foodItem.foodId}`).remove();
            score += 1;
            document.getElementById('score').innerText = `Comidas: ${score}`;
            if (score >= 20) activateHunterMode();
            const newSize = 40 + (score * 2);
            playerRect.setDisplaySize(newSize, newSize);
            playerText.y = -(newSize/2 + 15);
            playerRef.update({ score: score, size: newSize });
        });

        // --- COLISIÓN OBSTÁCULO CON REBOTE ---
        this.physics.add.overlap(container, obstaclesGroup, (player, obstacle) => {
            if (!isFrozen) {
                isFrozen = true;
                
                // Repulsión: lo empuja fuera del círculo
                const angle = Phaser.Math.Angle.Between(obstacle.x, obstacle.y, container.x, container.y);
                container.x += Math.cos(angle) * 50;
                container.y += Math.sin(angle) * 50;
                targetX = container.x;
                targetY = container.y;

                const freezeBlink = self.tweens.add({
                    targets: playerRect,
                    tint: 0xff0000,
                    alpha: 0.5,
                    duration: 150,
                    yoyo: true,
                    repeat: -1
                });

                self.time.delayedCall(3000, () => {
                    isFrozen = false;
                    freezeBlink.remove();
                    playerRect.setAlpha(1);
                    playerRect.clearTint();
                });
            }
        });

        function activateHunterMode() {
            if (isFrozen) return;
            isHunter = true;
            playerRef.update({ isHunter: true });
            if (blinkTween) blinkTween.remove();
            blinkTween = self.tweens.add({ targets: playerRect, alpha: 0.2, duration: 100, yoyo: true, repeat: -1 });

            if (hunterTimer) hunterTimer.remove();
            hunterTimer = self.time.delayedCall(3000, () => {
                isHunter = false;
                playerRect.setAlpha(1);
                if (blinkTween) blinkTween.remove();
                playerRef.update({ isHunter: false });
            });
        }

        db.ref('players').on('value', (snapshot) => {
            const data = snapshot.val() || {};
            let topPlayer = { name: "Nadie", score: -1 };
            Object.keys(data).forEach(id => {
                const p = data[id];
                if (p.score > topPlayer.score) topPlayer = p;
                if (id === myId) return;
                if (!otherPlayers[id]) {
                    const r = self.add.rectangle(0, 0, p.size, p.size, p.color);
                    const t = self.add.text(0, -(p.size/2 + 15), p.name, { fontSize: '12px', fill: '#fff' }).setOrigin(0.5);
                    otherPlayers[id] = self.add.container(p.x, p.y, [r, t]);
                } else {
                    otherPlayers[id].setPosition(p.x, p.y);
                    otherPlayers[id].list[0].setDisplaySize(p.size, p.size);
                    otherPlayers[id].list[0].setAlpha(p.isHunter ? 0.4 : 1);
                    otherPlayers[id].list[1].y = -(p.size/2 + 15);
                }
                if (isHunter && !p.isHunter && !isFrozen) {
                    let dist = Phaser.Math.Distance.Between(container.x, container.y, p.x, p.y);
                    if (dist < (playerRect.displayHeight/2 + p.size/2)) {
                        db.ref(`players/${id}`).remove();
                    }
                }
            });
            document.getElementById('leader').innerText = `LÍDER: ${topPlayer.name} (${topPlayer.score})`;
            Object.keys(otherPlayers).forEach(id => { if (!data[id]) { otherPlayers[id].destroy(); delete otherPlayers[id]; } });
        });

        // Comida en área vertical
        foodRef.on('child_added', (snapshot) => {
            const f = snapshot.val();
            const foodItem = self.add.circle(f.x, f.y, 8, 0xffff00);
            foodItem.foodId = snapshot.key;
            foodGroup.add(foodItem);
            this.physics.add.existing(foodItem);
        });

        this.input.on('pointermove', (p) => { if (p.isDown) { targetX = p.worldX; targetY = p.worldY; } });
        this.input.on('pointerdown', (p) => { targetX = p.worldX; targetY = p.worldY; });
    }

    function update() {
        if (!container) return;
        let lerpActual = isFrozen ? 0 : Math.max(VELOCIDAD_BASE / (1 + (score * FACTOR_PESO)), 0.01);
        container.x = Phaser.Math.Linear(container.x, targetX, lerpActual);
        container.y = Phaser.Math.Linear(container.y, targetY, lerpActual);
        playerRef.update({ x: container.x, y: container.y });
    }
</script>
</body>
</html>

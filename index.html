<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>Square Battle: Ultra Smooth</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.55.2/dist/phaser.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>
    <style> body { margin: 0; background: #000; overflow: hidden; } </style>
</head>
<body>
<script>
    const myName = prompt("¿Tu nombre?", "Jugador") || "Anónimo";
    const firebaseConfig = {
        apiKey: "AIzaSyBH492P6Zzt sHuMW8USDj-AwXjh2cYzwV4", 
        databaseURL: "https://phasermultiplayer-default-rtdb.firebaseio.com",
        projectId: "phasermultiplayer",
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const myId = Math.random().toString(36).substring(7);
    const playerRef = db.ref(`players/${myId}`);
    const playersRef = db.ref('players');
    const foodRef = db.ref('food');
    const stateRef = db.ref('gameState');

    const config = {
        type: Phaser.AUTO,
        scale: { mode: Phaser.Scale.FIT, autoCenter: Phaser.Scale.CENTER_BOTH, width: 450, height: 800 },
        physics: { default: 'arcade' },
        scene: { preload: preload, create: create, update: update }
    };

    const game = new Phaser.Game(config);
    let container, playerRect, foodGroup, obstaclesGroup;
    let uiScoreText, uiLeaderText, winPanel, winText, restartBtn;
    let otherPlayers = {}; 
    let score = 0, isFrozen = false, gameOver = false;
    const myColor = Math.random() * 0xffffff;
    let targetX = 225, targetY = 400;
    let currentSeed = '1';

    function preload() {}

    function create() {
        const self = this;
        foodGroup = this.physics.add.group();
        obstaclesGroup = this.physics.add.group();

        uiLeaderText = this.add.text(225, 40, 'Iniciando...', { fontSize: '20px', fill: '#ffcc00', fontWeight: 'bold' }).setOrigin(0.5).setDepth(100);
        uiScoreText = this.add.text(20, 80, 'Comidas: 0', { fontSize: '18px', fill: '#fff' }).setDepth(100);

        winPanel = this.add.rectangle(225, 400, 450, 800, 0x000000, 0.8).setDepth(500).setVisible(false);
        winText = this.add.text(225, 350, '', { fontSize: '32px', fill: '#fff', align: 'center' }).setOrigin(0.5).setDepth(501).setVisible(false);
        restartBtn = this.add.text(225, 500, ' REINICIAR ', { fontSize: '24px', fill: '#000', backgroundColor: '#00ff00', padding: 10 }).setOrigin(0.5).setDepth(501).setInteractive().setVisible(false);

        restartBtn.on('pointerdown', () => {
            const newSeed = Math.floor(Math.random() * 100).toString();
            foodRef.remove();
            playersRef.once('value', snap => { snap.forEach(c => c.ref.update({ score: 0, size: 40 })); });
            stateRef.set({ status: 'playing', winner: '', seed: newSeed });
        });

        // 3 OBSTÁCULOS FIJOS POR SEMILLA
        const setupMap = (seed) => {
            obstaclesGroup.clear(true, true);
            const rng = new Phaser.Math.RandomDataGenerator([seed]);
            for(let i = 0; i < 3; i++) {
                let x = rng.between(80, 370);
                let y = rng.between(150, 650);
                let obs = self.add.circle(x, y, 25, 0xff0000);
                obstaclesGroup.add(obs);
                self.physics.add.existing(obs);
            }
        };

        stateRef.on('value', snap => {
            const state = snap.val();
            if (!state) return;
            if (state.seed !== currentSeed) { currentSeed = state.seed; setupMap(currentSeed); }
            if (state.status === 'winner') {
                gameOver = true; winPanel.setVisible(true); winText.setText(`GANADOR:\n${state.winner}`).setVisible(true); restartBtn.setVisible(true);
            } else {
                gameOver = false; score = 0; uiScoreText.setText('Comidas: 0');
                winPanel.setVisible(false); winText.setVisible(false); restartBtn.setVisible(false);
                if(container) container.setPosition(225, 400);
            }
        });

        // SINCRONIZACIÓN SIN FANTASMAS
        playersRef.on('value', snap => {
            const data = snap.val() || {};
            Object.keys(otherPlayers).forEach(id => { if (!data[id]) { otherPlayers[id].destroy(); delete otherPlayers[id]; }});
            Object.keys(data).forEach(id => {
                if (id === myId) return;
                const p = data[id];
                if (!otherPlayers[id]) {
                    const r = self.add.rectangle(0, 0, p.size, p.size, p.color);
                    const t = self.add.text(0, -35, p.name, { fontSize: '12px', fill: '#fff' }).setOrigin(0.5);
                    otherPlayers[id] = self.add.container(p.x, p.y, [r, t]);
                } else {
                    otherPlayers[id].setPosition(p.x, p.y);
                    otherPlayers[id].list[0].setDisplaySize(p.size, p.size);
                }
            });
        });

        // COMIDA (MÁXIMO 3)
        const spawnFood = () => {
            foodRef.once('value', snap => {
                if (snap.numChildren() < 3) {
                    foodRef.push({ x: Phaser.Math.Between(50, 400), y: Phaser.Math.Between(100, 700) });
                }
            });
        };

        foodRef.on('child_added', snap => {
            const f = snap.val();
            const dot = self.add.circle(f.x, f.y, 10, 0xffff00);
            dot.id = snap.key;
            foodGroup.add(dot);
            self.physics.add.existing(dot);
        });

        foodRef.on('child_removed', snap => {
            foodGroup.getChildren().forEach(c => { if(c.id === snap.key) c.destroy(); });
            spawnFood();
        });

        // JUGADOR LOCAL
        playerRect = this.add.rectangle(0, 0, 40, 40, myColor);
        const myTxt = this.add.text(0, -35, myName, { fontSize: '14px', fill: '#fff' }).setOrigin(0.5);
        container = this.add.container(225, 400, [playerRect, myTxt]);
        this.physics.add.existing(container);

        playerRef.set({ x: 225, y: 400, name: myName, color: myColor, score: 0, size: 40 });
        playerRef.onDisconnect().remove();

        this.physics.add.overlap(container, foodGroup, (p, f) => {
            db.ref(`food/${f.id}`).remove();
            score++;
            uiScoreText.setText(`Comidas: ${score}`);
            playerRect.setDisplaySize(40 + score*2, 40 + score*2);
            playerRef.update({ score: score, size: 40 + score*2 });
        });

        this.physics.add.overlap(container, obstaclesGroup, () => {
            if (!isFrozen) {
                isFrozen = true; container.setAlpha(0.3);
                self.time.delayedCall(1500, () => { isFrozen = false; container.setAlpha(1); });
            }
        });

        this.input.on('pointermove', p => { if(p.isDown) { targetX = p.worldX; targetY = p.worldY; }});
        this.input.on('pointerdown', p => { targetX = p.worldX; targetY = p.worldY; });
        spawnFood();
    }

    function update() {
        if (!container || gameOver || isFrozen) return;
        container.x = Phaser.Math.Linear(container.x, targetX, 0.08);
        container.y = Phaser.Math.Linear(container.y, targetY, 0.08);
        playerRef.update({ x: container.x, y: container.y });
    }
</script>
</body>
</html>

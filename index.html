<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>Square Battle: 3 Obstacles & No Ghosts</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.55.2/dist/phaser.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>
    <style> body { margin: 0; background: #000; overflow: hidden; display: flex; justify-content: center; align-items: center; height: 100vh; } </style>
</head>
<body>
<script>
    const myName = prompt("¿Tu nombre?", "Jugador") || "Anónimo";
    const firebaseConfig = {
        apiKey: "AIzaSyBH492P6Zzt sHuMW8USDj-AwXjh2cYzwV4", 
        databaseURL: "https://phasermultiplayer-default-rtdb.firebaseio.com",
        projectId: "phasermultiplayer",
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const myId = Math.random().toString(36).substring(7);
    const playerRef = db.ref(`players/${myId}`);
    const foodRef = db.ref('food');
    const stateRef = db.ref('gameState');

    const config = {
        type: Phaser.AUTO,
        scale: { mode: Phaser.Scale.FIT, autoCenter: Phaser.Scale.CENTER_BOTH, width: 450, height: 800 },
        physics: { default: 'arcade' },
        scene: { preload: preload, create: create, update: update }
    };

    const game = new Phaser.Game(config);
    let container, playerRect, foodGroup, obstaclesGroup;
    let uiScoreText, uiLeaderText, winPanel, winText, restartBtn;
    let otherPlayers = {};
    let score = 0, isFrozen = false, gameOver = false;
    const myColor = Math.random() * 0xffffff;
    let targetX = 225, targetY = 400;
    let currentSeed = '123';

    function preload() {
        this.load.audio('sonidoComida', 'comida.mp3');
        this.load.audio('sonidoChoque', 'choque.mp3');
    }

    function create() {
        const self = this;
        foodGroup = this.physics.add.group();
        obstaclesGroup = this.physics.add.group();

        uiLeaderText = this.add.text(225, 40, 'Esperando...', { fontSize: '20px', fill: '#ffcc00', fontWeight: 'bold' }).setOrigin(0.5).setDepth(100);
        uiScoreText = this.add.text(20, 80, 'Comidas: 0', { fontSize: '18px', fill: '#fff' }).setDepth(100);

        winPanel = this.add.rectangle(225, 400, 450, 800, 0x000000, 0.8).setDepth(500).setVisible(false);
        winText = this.add.text(225, 350, '', { fontSize: '32px', fill: '#fff', align: 'center', fontWeight: 'bold' }).setOrigin(0.5).setDepth(501).setVisible(false);
        restartBtn = this.add.text(225, 500, ' REINICIAR TODO ', { fontSize: '28px', fill: '#000', backgroundColor: '#00ff00', padding: 15 }).setOrigin(0.5).setDepth(501).setInteractive().setVisible(false);

        restartBtn.on('pointerdown', () => {
            const newSeed = Math.floor(Math.random() * 10000).toString();
            foodRef.remove();
            db.ref('players').once('value', snapshot => {
                snapshot.forEach(child => { child.ref.update({ score: 0, size: 40, x: 225, y: 400 }); });
            });
            stateRef.set({ status: 'playing', winner: '', seed: newSeed });
        });

        // --- OBSTÁCULOS LIMITADOS A 3 ---
        const createObstacles = (seed) => {
            obstaclesGroup.clear(true, true);
            const randomGen = new Phaser.Math.RandomDataGenerator([seed]);
            for(let i = 0; i < 3; i++) { // CAMBIO: solo 3 obstáculos
                let x, y, dist;
                do { 
                    x = randomGen.between(50, 400); 
                    y = randomGen.between(150, 650); 
                    dist = Phaser.Math.Distance.Between(x, y, 225, 400);
                } while (dist < 120);
                let obs = self.add.circle(x, y, 25, 0xff0000);
                obstaclesGroup.add(obs);
                self.physics.add.existing(obs);
            }
        };

        stateRef.on('value', (snapshot) => {
            const state = snapshot.val();
            if (!state) return;
            if (state.seed !== currentSeed) { currentSeed = state.seed; createObstacles(currentSeed); }
            if (state.status === 'winner') {
                gameOver = true; winPanel.setVisible(true);
                winText.setText(`¡GANADOR!\n${state.winner}`).setVisible(true);
                restartBtn.setVisible(true);
            } else {
                gameOver = false; score = 0; uiScoreText.setText('Comidas: 0');
                winPanel.setVisible(false); winText.setVisible(false); restartBtn.setVisible(false);
                if(container) { container.setPosition(225, 400); playerRect.setDisplaySize(40, 40); }
                targetX = 225; targetY = 400;
            }
        });

        // --- SINCRONIZACIÓN ULTRA-LIMPIA PARA OTROS JUGADORES ---
        db.ref('players').on('value', (snapshot) => {
            const data = snapshot.val() || {};
            let topPlayer = null;

            // Eliminar contenedores de jugadores que ya no existen
            for (let id in otherPlayers) {
                if (!data[id]) {
                    if (otherPlayers[id]) otherPlayers[id].destroy();
                    delete otherPlayers[id];
                }
            }

            Object.keys(data).forEach(id => {
                const p = data[id];
                if (!p) return;
                if (!topPlayer || p.score > topPlayer.score) topPlayer = p;
                if (id === myId) {
                    if (p.score >= 100 && !gameOver) stateRef.update({ status: 'winner', winner: myName });
                    return;
                }

                if (!otherPlayers[id]) {
                    const r = self.add.rectangle(0, 0, p.size || 40, p.size || 40, p.color);
                    const t = self.add.text(0, -35, p.name || "Jugador", { fontSize: '12px', fill: '#fff' }).setOrigin(0.5);
                    otherPlayers[id] = self.add.container(p.x, p.y, [r, t]);
                } else if (otherPlayers[id].active) { // Validación de seguridad
                    otherPlayers[id].setPosition(p.x, p.y);
                    if (otherPlayers[id].list && otherPlayers[id].list[0]) {
                        otherPlayers[id].list[0].setDisplaySize(p.size, p.size);
                        otherPlayers[id].list[1].y = -(p.size/2 + 15);
                    }
                }
            });
            if (topPlayer) uiLeaderText.setText(`👑 LÍDER: ${topPlayer.name} (${topPlayer.score})`);
        });

        // --- LÓGICA DE COMIDA (HASTA 3) ---
        const spawnFood = () => {
            if (gameOver) return;
            foodRef.once('value', snap => {
                if (snap.numChildren() < 3) {
                    let x = Phaser.Math.Between(40, 410);
                    let y = Phaser.Math.Between(120, 740);
                    foodRef.push({ x, y });
                }
            });
        };

        foodRef.on('child_added', snapshot => {
            const f = snapshot.val();
            const foodItem = self.add.circle(f.x, f.y, 10, 0xffff00);
            foodItem.foodId = snapshot.key;
            foodGroup.add(foodItem);
            self.physics.add.existing(foodItem);
        });

        foodRef.on('child_removed', snapshot => {
            foodGroup.getChildren().forEach(child => { if (child.foodId === snapshot.key) child.destroy(); });
            if (!gameOver) spawnFood();
        });

        // Jugador Local
        playerRect = this.add.rectangle(0, 0, 40, 40, myColor);
        const nameLabel = this.add.text(0, -35, myName, { fontSize: '14px', fill: '#fff' }).setOrigin(0.5);
        container = this.add.container(225, 400, [playerRect, nameLabel]);
        this.physics.add.existing(container);

        playerRef.set({ x: 225, y: 400, id: myId, name: myName, color: myColor, score: 0, size: 40 });
        playerRef.onDisconnect().remove();

        this.physics.add.overlap(container, foodGroup, (p, f) => {
            if (gameOver) return;
            this.sound.play('sonidoComida', { volume: 0.5 });
            db.ref(`food/${f.foodId}`).remove();
            score++;
            uiScoreText.setText(`Comidas: ${score}`);
            let nSize = 40 + (score * 2);
            playerRect.setDisplaySize(nSize, nSize);
            playerRef.update({ score: score, size: nSize });
        });

        this.physics.add.overlap(container, obstaclesGroup, (p, obs) => {
            if (!isFrozen && !gameOver) {
                this.sound.play('sonidoChoque', { volume: 0.6 });
                isFrozen = true;
                const ang = Phaser.Math.Angle.Between(obs.x, obs.y, container.x, container.y);
                container.x += Math.cos(ang) * 60; container.y += Math.sin(ang) * 60;
                targetX = container.x; targetY = container.y;
                const tw = self.tweens.add({ targets: playerRect, alpha: 0.3, duration: 100, yoyo: true, repeat: -1 });
                self.time.delayedCall(2000, () => { isFrozen = false; tw.remove(); playerRect.setAlpha(1); });
            }
        });

        this.input.on('pointermove', p => { if (p.isDown && !gameOver) { targetX = p.worldX; targetY = p.worldY; } });
        this.input.on('pointerdown', p => { if (!gameOver) { targetX = p.worldX; targetY = p.worldY; } });
        
        // Iniciar primera comida
        spawnFood();
    }

    function update() {
        if (!container || gameOver) return;
        let lerp = isFrozen ? 0 : 0.05;
        container.x = Phaser.Math.Linear(container.x, targetX, lerp);
        container.y = Phaser.Math.Linear(container.y, targetY, lerp);
        playerRef.update({ x: container.x, y: container.y });
    }
</script>
</body>
</html>

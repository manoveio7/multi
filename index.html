<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>Square Battle: Speed Fix</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.55.2/dist/phaser.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>
    <style> body { margin: 0; background: #000; overflow: hidden; } canvas { display: block; } </style>
</head>
<body>
<script>
    // 1. CONFIGURACIÓN INICIAL
    const myName = prompt("¿Tu nombre?", "Jugador") || "Pro";
    const firebaseConfig = {
        apiKey: "AIzaSyBH492P6Zzt sHuMW8USDj-AwXjh2cYzwV4", 
        databaseURL: "https://phasermultiplayer-default-rtdb.firebaseio.com",
        projectId: "phasermultiplayer",
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const myId = Math.random().toString(36).substring(7);

    const config = {
        type: Phaser.AUTO,
        width: 450, height: 800,
        physics: { default: 'arcade' },
        scene: { create: create, update: update }
    };
    const game = new Phaser.Game(config);

    let player, foodGroup, obsGroup, uiLider, uiPuntos;
    let others = {};
    let score = 0;
    let targetX = 225, targetY = 400;

    function create() {
        const self = this;
        foodGroup = this.physics.add.group();
        obsGroup = this.physics.add.staticGroup();

        // UI
        uiLider = this.add.text(225, 40, '👑 LIDER: ---', { fontSize: '20px', fill: '#ffcc00' }).setOrigin(0.5).setDepth(10);
        uiPuntos = this.add.text(20, 20, 'Puntos: 0', { fontSize: '16px', fill: '#fff' }).setDepth(10);

        // Obstáculos (Fijos para evitar lag)
        [{x:110,y:250}, {x:340,y:450}, {x:225,y:650}].forEach(p => {
            let o = self.add.circle(p.x, p.y, 25, 0xff0000);
            obsGroup.add(o);
        });

        // MI JUGADOR
        const color = Math.random() * 0xffffff;
        let rect = this.add.rectangle(0, 0, 40, 40, color);
        let txt = this.add.text(0, -30, myName, { fontSize: '12px' }).setOrigin(0.5);
        player = this.add.container(225, 400, [rect, txt]);
        this.physics.add.existing(player);

        // REGISTRO EN RED
        db.ref(`players/${myId}`).set({ x: 225, y: 400, name: myName, score: 0, color: color });
        db.ref(`players/${myId}`).onDisconnect().remove();

        // ESCUCHAR OTROS (Optimizado)
        db.ref('players').on('value', snap => {
            const data = snap.val() || {};
            let topS = -1, topN = "---";

            // Borrar desconectados
            Object.keys(others).forEach(id => {
                if (!data[id]) { others[id].destroy(); delete others[id]; }
            });

            // Actualizar/Crear
            Object.keys(data).forEach(id => {
                const d = data[id];
                if (d.score > topS) { topS = d.score; topN = d.name; }
                if (id === myId) return;

                if (!others[id]) {
                    let r = self.add.rectangle(0, 0, 40 + d.score, 40 + d.score, d.color);
                    let t = self.add.text(0, -30, d.name, { fontSize: '10px' }).setOrigin(0.5);
                    others[id] = self.add.container(d.x, d.y, [r, t]);
                } else {
                    others[id].setPosition(d.x, d.y);
                }
            });
            uiLider.setText(`👑 LIDER: ${topN} (${topS})`);
        });

        // COMIDA
        db.ref('food').on('value', snap => {
            foodGroup.clear(true, true);
            const data = snap.val() || {};
            Object.keys(data).forEach(k => {
                let f = self.add.circle(data[k].x, data[k].y, 8, 0xffff00);
                f.fId = k;
                foodGroup.add(f);
            });
        });

        // COLISIONES
        this.physics.add.overlap(player, foodGroup, (p, f) => {
            db.ref(`food/${f.fId}`).remove();
            score++;
            uiPuntos.setText('Puntos: ' + score);
            player.list[0].setDisplaySize(40 + score, 40 + score);
            db.ref(`players/${myId}`).update({ score: score });
            db.ref('food').push({ x: Phaser.Math.Between(50, 400), y: Phaser.Math.Between(100, 700) });
        });

        // INPUT
        this.input.on('pointermove', p => { targetX = p.worldX; targetY = p.worldY; });
        this.input.on('pointerdown', p => { targetX = p.worldX; targetY = p.worldY; });
    }

    function update() {
        if (!player) return;
        // Suavizado de movimiento (evita tirones)
        player.x = Phaser.Math.Linear(player.x, targetX, 0.15);
        player.y = Phaser.Math.Linear(player.y, targetY, 0.15);

        // Enviar a Firebase solo 20 veces por segundo (EL SECRETO ANTI-TRABA)
        if (game.loop.frame % 3 === 0) {
            db.ref(`players/${myId}`).update({ x: player.x, y: player.y });
        }
    }
</script>
</body>
</html>

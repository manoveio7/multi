<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>Square Battle: Pro Audio Edition</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.55.2/dist/phaser.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; display: flex; justify-content: center; align-items: center; height: 100vh; }
    </style>
</head>
<body>

<script>
    const myName = prompt("¿Tu nombre?", "Jugador") || "Anónimo";

    const firebaseConfig = {
        apiKey: "AIzaSyBH492P6Zzt sHuMW8USDj-AwXjh2cYzwV4", 
        databaseURL: "https://phasermultiplayer-default-rtdb.firebaseio.com",
        projectId: "phasermultiplayer",
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const myId = Math.random().toString(36).substring(7);
    const playerRef = db.ref(`players/${myId}`);
    const foodRef = db.ref('food');

    // Limpieza inicial de comida vieja
    foodRef.remove(); 

    const config = {
        type: Phaser.AUTO,
        scale: { mode: Phaser.Scale.FIT, autoCenter: Phaser.Scale.CENTER_BOTH, width: 450, height: 800 },
        physics: { default: 'arcade' },
        scene: { preload: preload, create: create, update: update }
    };

    const game = new Phaser.Game(config);
    let container, playerRect, foodGroup, obstaclesGroup;
    let uiScoreText, uiLeaderText;
    let otherPlayers = {};
    let score = 0;
    let isFrozen = false;
    const myColor = Math.random() * 0xffffff;
    let targetX = 225, targetY = 400;
    
    // Variables de Audio
    let bgMusic, sfxComida, sfxChoque;

    function preload() {
        // Carga de archivos (Asegúrate de que los nombres coincidan al descargar)
        this.load.audio('musicaFondo', 'musica.mp3');
        this.load.audio('sonidoComida', 'comida.mp3');
        this.load.audio('sonidoChoque', 'choque.mp3');
    }

    function create() {
        const self = this;

        // Configuración de Música en Loop
        bgMusic = this.sound.add('musicaFondo', { volume: 0.4, loop: true });
        
        // Iniciar música al primer toque (requisito del navegador)
        this.input.once('pointerdown', () => {
            if (!bgMusic.isPlaying) bgMusic.play();
        });

        foodGroup = this.physics.add.group();
        obstaclesGroup = this.physics.add.group();

        // UI Phaser
        uiLeaderText = this.add.text(225, 40, '👑 Esperando...', { fontSize: '22px', fill: '#ffcc00', fontWeight: 'bold' }).setOrigin(0.5).setDepth(100);
        uiScoreText = this.add.text(20, 80, 'Comidas: 0', { fontSize: '18px', fill: '#fff' }).setDepth(100);

        // Jugador Local
        playerRect = this.add.rectangle(0, 0, 40, 40, myColor);
        const nameText = this.add.text(0, -35, myName, { fontSize: '14px', fill: '#fff' }).setOrigin(0.5);
        container = this.add.container(225, 400, [playerRect, nameText]);
        container.setSize(40, 40);
        this.physics.add.existing(container);

        playerRef.set({ x: 225, y: 400, id: myId, name: myName, color: myColor, score: 0, size: 40 });
        playerRef.onDisconnect().remove();

        // Obstáculos y sus posiciones para validar comida
        const obsPositions = [];
        for(let i = 0; i < 5; i++) {
            let x = Phaser.Math.Between(80, 370);
            let y = Phaser.Math.Between(150, 650);
            let obs = this.add.circle(x, y, 20, 0xff0000);
            obstaclesGroup.add(obs);
            this.physics.add.existing(obs);
            obsPositions.push({x, y});
        }

        // Spawn de comida evitando obstáculos
        const spawnFood = () => {
            let safeX, safeY, isSafe = false;
            while (!isSafe) {
                safeX = Phaser.Math.Between(40, 410);
                safeY = Phaser.Math.Between(120, 740);
                isSafe = obsPositions.every(obs => Phaser.Math.Distance.Between(safeX, safeY, obs.x, obs.y) > 70);
            }
            foodRef.push({ x: safeX, y: safeY });
        };
        for(let i=0; i<4; i++) spawnFood();

        // Sincronización de Red y Limpieza de Fantasmas
        db.ref('players').on('value', (snapshot) => {
            const data = snapshot.val() || {};
            let topPlayer = null;

            Object.keys(data).forEach(id => {
                const p = data[id];
                if (p && p.name && (!topPlayer || p.score > topPlayer.score)) topPlayer = p;
                if (id === myId) return;

                if (!otherPlayers[id]) {
                    const r = self.add.rectangle(0, 0, p.size || 40, p.size || 40, p.color);
                    const t = self.add.text(0, -35, p.name || "Jugador", { fontSize: '12px', fill: '#fff' }).setOrigin(0.5);
                    otherPlayers[id] = self.add.container(p.x, p.y, [r, t]);
                } else {
                    otherPlayers[id].setPosition(p.x, p.y);
                    otherPlayers[id].list[0].setDisplaySize(p.size, p.size);
                    otherPlayers[id].list[1].y = -(p.size/2 + 15);
                }
            });

            Object.keys(otherPlayers).forEach(id => {
                if (!data[id]) { otherPlayers[id].destroy(); delete otherPlayers[id]; }
            });

            if (topPlayer) uiLeaderText.setText(`👑 LÍDER: ${topPlayer.name} (${topPlayer.score})`);
        });

        // Eventos de Comida
        foodRef.on('child_added', (snapshot) => {
            const f = snapshot.val();
            const foodItem = self.add.circle(f.x, f.y, 8, 0xffff00);
            foodItem.foodId = snapshot.key;
            foodGroup.add(foodItem);
            this.physics.add.existing(foodItem);
        });

        foodRef.on('child_removed', (snapshot) => {
            foodGroup.getChildren().forEach(child => { if (child.foodId === snapshot.key) child.destroy(); });
            if (foodGroup.getLength() < 4) spawnFood();
        });

        // --- COLISIÓN COMIDA + SONIDO ---
        this.physics.add.overlap(container, foodGroup, (p, f) => {
            this.sound.play('sonidoComida', { volume: 0.6 });
            db.ref(`food/${f.foodId}`).remove();
            score++;
            uiScoreText.setText(`Comidas: ${score}`);
            let nSize = 40 + (score * 2);
            playerRect.setDisplaySize(nSize, nSize);
            nameText.y = -(nSize/2 + 15);
            playerRef.update({ score: score, size: nSize });
        });

        // --- COLISIÓN OBSTÁCULO + SONIDO ---
        this.physics.add.overlap(container, obstaclesGroup, (p, obs) => {
            if (!isFrozen) {
                this.sound.play('sonidoChoque', { volume: 0.7 });
                isFrozen = true;
                const ang = Phaser.Math.Angle.Between(obs.x, obs.y, container.x, container.y);
                container.x += Math.cos(ang) * 65;
                container.y += Math.sin(ang) * 65;
                targetX = container.x; targetY = container.y;
                
                const tw = self.tweens.add({ targets: playerRect, alpha: 0.3, duration: 100, yoyo: true, repeat: -1 });
                self.time.delayedCall(3000, () => {
                    isFrozen = false; tw.remove(); playerRect.setAlpha(1);
                    targetX = container.x; targetY = container.y;
                });
            }
        });

        this.input.on('pointermove', (p) => { if (p.isDown) { targetX = p.worldX; targetY = p.worldY; } });
        this.input.on('pointerdown', (p) => { targetX = p.worldX; targetY = p.worldY; });
    }

    function update() {
        if (!container) return;
        let lerp = isFrozen ? 0 : Math.max(0.08 / (1 + (score * 0.005)), 0.01);
        container.x = Phaser.Math.Linear(container.x, targetX, lerp);
        container.y = Phaser.Math.Linear(container.y, targetY, lerp);
        playerRef.update({ x: container.x, y: container.y });
    }
</script>
</body>
</html>
